name: Daily Stock Index Update

on:
  schedule:
    # 週一到週五 09:03 UTC = 17:03 台灣時間（收盤後）
    - cron: '3 9 * * 1-5'
  workflow_dispatch: # 允許手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock index crawler
        run: python crawler.py

      - name: Run TX futures crawler
        run: python tx_futures_crawler.py

      - name: Run institutional crawler
        continue-on-error: true   # TAIFEX 限流時不擋住後續訊號與帳本
        run: python institutional_crawler.py

      - name: Run US market crawler
        continue-on-error: true
        run: python us_market_crawler.py

      - name: Compute strategy signals
        run: python strategy_signal.py

      - name: Compute v2 signals
        run: python strategy_signal_v2.py

      - name: Capture signal ledger (append-only, INSERT OR IGNORE)
        run: python signal_ledger.py

      - name: Export signals JSON for dashboard
        run: python export_signals.py

      - name: Commit updated databases
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_index.db tx_futures.db strategy_signal.db institutional.db signal_ledger.db docs/signals.json
          git diff --staged --quiet || git commit -m "Daily update: $(date -u +%Y-%m-%d)"
          git push
